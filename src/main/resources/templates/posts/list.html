<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Post List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <div class="row">
        <div class="col-md-10 offset-md-1">
            <h1 class="mb-4">Post List</h1>
            
            <div class="mb-4">
                <h2>新規投稿</h2>
                <a href="/posts/new" class="btn btn-primary">New Post</a>
            </div>

            <h2>掲示板一覧</h2>
            <table class="table table-striped table-bordered mt-3">
                <thead class="table-dark">
                    <tr>
                        <th scope="col" style="width: 30%;">タイトル</th>
                        <th scope="col" style="width: 50%;">感想</th>
                        <th scope="col" style="width: 20%;" class="text-end">アクション</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="post : ${posts}">
                        <td>
                            <a th:href="@{/posts/{id}(id=${post.id})}" th:text="${post.title}"></a>
                        </td>
                        <td>
                            <span th:text="${post.content}"></span>
                        </td>
                        <td class="text-end">
                            <a th:href="@{/posts/{id}/edit(id=${post.id})}" class="btn btn-warning btn-sm">Edit</a>
                            <form th:action="@{/posts/{id}/delete(id=${post.id})}" method="post" style="display: inline;">
                                <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(posts)}">
                        <td colspan="3" class="text-center text-muted">投稿はまだありません。</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
